<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet"
      href="css/styles.css">

</head>

<body>

<div class="container">

<h2>Register</h2>

<form id="registerForm">

<input type="text"
       id="username"
       placeholder="Username"
       required>

<input type="password"
       id="password"
       placeholder="Password"
       required>

<button type="submit">
Register
</button>

<p>
Already have account?
<a href="login.html">
Login
</a>
</p>

<p id="errorMessage"
   class="error"></p>

</form>

</div>

<script src="js/register.js"></script>

</body>
</html>
