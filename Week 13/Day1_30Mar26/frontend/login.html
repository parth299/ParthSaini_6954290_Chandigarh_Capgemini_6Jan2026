<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet"
          href="css/styles.css">
</head>

<body>

<div class="container">

    <h2>Login</h2>

    <form id="loginForm">

        <input type="text"
               id="username"
               placeholder="Username"
               required>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="register.html">
                Register
            </a>
        </p>

        <p id="errorMessage"
           class="error"></p>

    </form>

</div>

<script src="js/login.js"></script>

</body>
</html>
